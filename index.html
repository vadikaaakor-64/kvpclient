<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Studio — учёт клиентов и оплат</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F1012;
    --surface: #17181C;
    --surface-2: #1E2024;
    --line: #2A2C31;
    --text: #F3F2ED;
    --text-muted: #8C8E96;
    --accent: #FF4D2E;        /* clapper red-orange — CTA, REC */
    --accent-dim: rgba(255,77,46,.14);
    --ok: #4ADE80;             /* остаток здоровый */
    --ok-dim: rgba(74,222,128,.14);
    --warn: #FBBF24;           /* остаток заканчивается */
    --warn-dim: rgba(251,191,36,.14);
    --danger: #FF5C6C;         /* остаток исчерпан / перерасход */
    --danger-dim: rgba(255,92,108,.14);
    --radius: 14px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
  }
  .app{ display:flex; height:100vh; }

  /* ---------- Sidebar (desktop) ---------- */
  .sidebar{
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--line);
    display:flex; flex-direction:column;
    padding: 20px 12px;
  }
  .brand{
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: .5px;
    padding: 6px 10px 20px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding: 11px 12px; border-radius: 10px;
    color: var(--text-muted); font-weight:600; font-size:14px;
    cursor:pointer; margin-bottom:2px; user-select:none;
  }
  .nav-item svg{ width:18px; height:18px; opacity:.85; }
  .nav-item.active{ background: var(--surface-2); color: var(--text); }
  .nav-item.active svg{ opacity:1; }
  .nav-item:hover:not(.active){ background: rgba(255,255,255,.03); }
  .sidebar-footer{ margin-top:auto; padding:12px 10px; font-size:12px; color:var(--text-muted); border-top:1px solid var(--line); padding-top:14px;}

  /* ---------- Main column ---------- */
  .main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 24px; border-bottom:1px solid var(--line);
    background: var(--bg);
  }
  .topbar h1{ font-family:var(--font-display); font-size:22px; letter-spacing:.4px; font-weight:400;}
  .topbar .sub{ font-size:12.5px; color:var(--text-muted); margin-top:2px; }
  .fab{
    background: var(--accent); color:#1a0a05; border:none; border-radius: 10px;
    font-family: var(--font-body); font-weight:700; font-size:13.5px;
    padding: 10px 16px; cursor:pointer; display:flex; align-items:center; gap:6px;
    box-shadow: 0 4px 14px rgba(255,77,46,.28);
  }
  .fab:hover{ filter: brightness(1.06); }
  .content{ flex:1; overflow-y:auto; padding: 22px 24px 90px; }

  /* ---------- Film-strip decorative rule ---------- */
  .filmrule{
    height:10px; margin-bottom:18px;
    background-image: radial-gradient(circle, var(--line) 1.6px, transparent 1.6px);
    background-size: 14px 10px;
    background-position: 0 center;
    opacity:.7;
  }

  /* ---------- Cards / grid ---------- */
  .grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:14px; margin-bottom:22px; }
  .grid-3{ display:grid; grid-template-columns: repeat(3,1fr); gap:12px; margin-bottom:18px; }
  @media (max-width:520px){ .grid-3{ grid-template-columns: 1fr; } }
  .stat-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 16px 14px;
  }
  .stat-card .label{ font-size:12px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .stat-card .value{ font-family:var(--font-mono); font-size:26px; font-weight:700; margin-top:8px; font-variant-numeric: tabular-nums; }
  .stat-card .delta{ font-size:12px; margin-top:6px; color: var(--ok); font-weight:600; }
  .stat-card .delta.neg{ color:var(--accent); }

  .panel{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; margin-bottom:18px;
  }
  .panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .panel-head h3{ font-size:14.5px; font-weight:700; }
  .panel-head .hint{ font-size:12px; color:var(--text-muted); }

  /* chart */
  .chart{ display:flex; align-items:flex-end; gap:10px; height:140px; padding-top:6px; }
  .chart .col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .chart .bar-wrap{ width:100%; height:104px; display:flex; align-items:flex-end; justify-content:center; }
  .chart .bar{ width:60%; border-radius:5px 5px 3px 3px; background: linear-gradient(180deg, var(--accent), #B8330F); min-height:4px; transition: height .5s ease; }
  .chart .m-label{ font-size:11px; color:var(--text-muted); font-weight:600; }
  .chart .m-value{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-muted); }

  /* rank / list rows shared */
  .rank-row{ display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); }
  .rank-row:last-child{ border-bottom:none; }
  .rank-num{ font-family:var(--font-mono); color:var(--text-muted); font-size:12px; width:16px; }
  .avatar{
    width:34px; height:34px; border-radius:9px; background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;
    flex-shrink:0; border:1px solid var(--line);
  }
  .rank-info{ flex:1; min-width:0; }
  .rank-info .name{ font-size:13.5px; font-weight:600; }
  .rank-info .meta{ font-size:11.5px; color:var(--text-muted); }
  .rank-amount{ font-family:var(--font-mono); font-weight:700; font-size:13.5px; }
  .bar-bg{ height:4px; border-radius:2px; background:var(--line); margin-top:6px; overflow:hidden; }
  .bar-fg{ height:100%; background:var(--accent); border-radius:2px; }

  /* balance badge — the core new concept */
  .balance{ display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-weight:700; font-size:13px; padding:5px 10px; border-radius:8px; white-space:nowrap; }
  .balance.ok{ background:var(--ok-dim); color:var(--ok); }
  .balance.warn{ background:var(--warn-dim); color:var(--warn); }
  .balance.danger{ background:var(--danger-dim); color:var(--danger); }
  .balance .n{ font-size:15px; }

  /* generic table/list rows */
  .row{
    display:flex; align-items:center; gap:12px; padding:13px 4px;
    border-bottom:1px solid var(--line); cursor:pointer;
  }
  .row:hover{ background: rgba(255,255,255,.02); }
  .row:last-child{ border-bottom:none; }
  .row .title{ font-size:14px; font-weight:600; }
  .row .subtitle{ font-size:12px; color:var(--text-muted); margin-top:2px; }
  .row .right{ margin-left:auto; text-align:right; flex-shrink:0; }
  .row .amount{ font-family:var(--font-mono); font-weight:700; font-size:14px; }

  .search{
    width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; color:var(--text); font-family:var(--font-body); font-size:13.5px; margin-bottom:14px;
  }
  .search::placeholder{ color:var(--text-muted); }
  .search:focus{ outline:none; border-color:var(--accent); }

  .alert-panel{ border:1px solid rgba(251,191,36,.3); background:var(--warn-dim); }
  .alert-panel h3{ color:var(--warn); }

  .last-update{ font-size:11.5px; margin-top:3px; display:flex; align-items:center; gap:5px; }
  .last-update .dot{ width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .last-update.fresh{ color:var(--text-muted); }
  .last-update.fresh .dot{ background:var(--ok); }
  .last-update.aging{ color:var(--warn); }
  .last-update.aging .dot{ background:var(--warn); }
  .last-update.stale{ color:var(--danger); }
  .last-update.stale .dot{ background:var(--danger); }

  /* ---------- Экран входа ---------- */
  #loginScreen{
    position:fixed; inset:0; z-index:1000; background:var(--bg);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-card{
    width:100%; max-width:360px; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:32px 26px;
  }
  .login-brand{
    font-family:var(--font-display); font-size:28px; letter-spacing:.5px;
    display:flex; align-items:center; gap:9px; justify-content:center; margin-bottom:6px;
  }
  .login-brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
  .login-sub{ text-align:center; font-size:12.5px; color:var(--text-muted); margin-bottom:24px; }
  .login-error{ color:var(--danger); font-size:12.5px; text-align:center; margin-top:4px; min-height:16px; }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
    align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.show{ display:flex; }
  .sheet{
    background: var(--surface); width:100%; max-width:460px; border-radius:16px 16px 0 0;
    padding:20px 20px 24px; border:1px solid var(--line); border-bottom:none;
    max-height:86vh; overflow-y:auto;
  }
  @media (min-width:860px){
    .overlay{ align-items:center; }
    .sheet{ border-radius:16px; border-bottom:1px solid var(--line); }
  }
  .sheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .sheet-head h3{ font-size:16px; font-weight:700; }
  .close-x{ width:28px; height:28px; border-radius:8px; background:var(--surface-2); border:none; color:var(--text-muted); cursor:pointer; font-size:16px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; }
  .field input, .field select, .field textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:9px;
    padding:11px 12px; color:var(--text); font-family:var(--font-body); font-size:14px;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--accent); }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  .field-note{ font-size:11.5px; color:var(--text-muted); margin-top:5px; }
  .btn-row{ display:flex; gap:10px; margin-top:6px; }
  .btn{
    flex:1; padding:12px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; border:none;
    font-family:var(--font-body);
  }
  .btn-primary{ background:var(--accent); color:#1a0a05; }
  .btn-primary:hover{ filter:brightness(1.06); }
  .btn-ghost{ background:var(--surface-2); color:var(--text); border:1px solid var(--line); }
  .btn-danger{ background:rgba(255,77,46,.1); color:var(--accent); border:1px solid rgba(255,77,46,.25); flex:0 0 auto; padding:12px 16px;}

  .quick-choice{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .qc-btn{
    background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:16px 8px;
    display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer;
  }
  .qc-btn:hover{ border-color:var(--accent); }
  .qc-btn svg{ width:22px; height:22px; color:var(--accent); }
  .qc-btn span{ font-size:12px; font-weight:600; }

  /* ---------- Bottom nav (mobile) ---------- */
  .bottom-nav{ display:none; }

  /* ---------- Responsive: mobile / Telegram phone view ---------- */
  @media (max-width: 820px){
    .sidebar{ display:none; }
    .content{ padding: 16px 14px 90px; }
    .topbar{ padding:14px 16px; }
    .grid{ grid-template-columns: repeat(2,1fr); }
    .bottom-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; height:64px;
      background: var(--surface); border-top:1px solid var(--line); z-index:20;
    }
    .bn-item{
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      color:var(--text-muted); font-size:10.5px; font-weight:600; cursor:pointer;
    }
    .bn-item svg{ width:20px; height:20px; }
    .bn-item.active{ color:var(--accent); }
    .fab span{ display:none; }
    .fab{ padding:11px; border-radius:12px; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand"><span class="dot"></span>REELS STUDIO</div>
    <div class="login-sub">Внутренний инструмент — вход только для команды</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ==================================================================
   НАСТРОЙКА БАЗЫ ДАННЫХ (Supabase)
   Впишите сюда данные вашего проекта — они есть в Supabase:
   Project Settings → API → Project URL и anon public key
================================================================== */
const SUPABASE_URL = 'https://htdohpvpbldrxwmsvuqy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_34H_XebSAiY32J8u_YKqXA_wh57w4Db';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---------------- STATE (загружается из базы при старте) ----------------
   Модель баланса:
   - Оплата (payment) фиксирует сумму И количество купленных роликов (reelsCount)
   - Ролик (reel) — просто факт "готово ещё N роликов" для клиента (по умолчанию 1)
   - Остаток клиента = сумма reelsCount по всем его оплатам − сумма готовых роликов
------------------------------------------------------------------ */
let clients = [];
let payments = [];
let reels = [];
let activeTab = 'dashboard';
let clientFilter = '';

/* ---------------- ЗАГРУЗКА / СОХРАНЕНИЕ (Supabase) ---------------- */
const rowToClient = r => ({id:r.id, name:r.name, tag:r.tag, note:r.note, color:r.color});
const rowToPayment = r => ({id:r.id, clientId:r.client_id, amount:r.amount, reelsCount:r.reels_count, date:r.date, comment:r.comment});
const rowToReel = r => ({id:r.id, clientId:r.client_id, note:r.note, date:r.date});

async function loadAll(){
  const content = document.getElementById('content');
  content.innerHTML = '<div style="padding:40px 0; text-align:center; color:var(--text-muted);">Загрузка данных...</div>';
  try{
    const [c,p,r] = await Promise.all([
      db.from('clients').select('*').order('id'),
      db.from('payments').select('*').order('id'),
      db.from('reels').select('*').order('id'),
    ]);
    if(c.error || p.error || r.error){
      content.innerHTML = `<div style="padding:24px; color:var(--danger);">Не удалось загрузить данные. Проверьте SUPABASE_URL и SUPABASE_ANON_KEY в коде.<br><br>${(c.error||p.error||r.error).message}</div>`;
      return;
    }
    clients = c.data.map(rowToClient);
    payments = p.data.map(rowToPayment);
    reels = r.data.map(rowToReel);
    render();
  }catch(e){
    content.innerHTML = `<div style="padding:24px; color:var(--danger);">Ошибка соединения с базой: ${e.message}</div>`;
  }
}

/* ---------------- HELPERS ---------------- */
const fmtMoney = n => '₽' + n.toLocaleString('ru-RU');
const clientById = id => clients.find(c => c.id === id);
const initials = name => name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

const monthNamesShort = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

function totalRevenue(){ return payments.reduce((s,p)=>s+p.amount,0); }
function revenueThisMonth(){
  const now = new Date();
  return payments.filter(p=>{ const d=new Date(p.date); return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth(); })
    .reduce((s,p)=>s+p.amount,0);
}
function revenueLastMonth(){
  const now = new Date();
  let m = now.getMonth()-1, y = now.getFullYear(); if(m<0){m=11;y--;}
  return payments.filter(p=>{ const d=new Date(p.date); return d.getFullYear()===y && d.getMonth()===m; })
    .reduce((s,p)=>s+p.amount,0);
}
function clientTotalPaid(id){ return payments.filter(p=>p.clientId===id).reduce((s,p)=>s+p.amount,0); }
function clientReelsPurchased(id){ return payments.filter(p=>p.clientId===id).reduce((s,p)=>s+p.reelsCount,0); }
function clientReelsDone(id){ return reels.filter(r=>r.clientId===id).length; }
function clientBalance(id){ return clientReelsPurchased(id) - clientReelsDone(id); }

/* Средняя цена за ролик у клиента: сумма всех его оплат / кол-во купленных роликов.
   Используется, чтобы понять, сколько "стоит" каждый готовый ролик и сколько
   денег ещё "заморожено" в неотработанном остатке. */
function clientPricePerReel(id){
  const purchased = clientReelsPurchased(id);
  if(!purchased) return 0;
  return clientTotalPaid(id) / purchased;
}
function clientFrozenBudget(id){
  return Math.max(clientBalance(id),0) * clientPricePerReel(id);
}
function totalFrozenBudget(){
  return clients.reduce((s,c)=>s+clientFrozenBudget(c.id),0);
}
function reelsInMonth(monthOffset){
  const now = new Date();
  let m = now.getMonth()-monthOffset, y = now.getFullYear();
  while(m<0){m+=12;y--;}
  return reels.filter(r=>{const d=new Date(r.date); return d.getMonth()===m && d.getFullYear()===y;});
}
function earnedInMonth(monthOffset){
  return reelsInMonth(monthOffset).reduce((s,r)=>s+clientPricePerReel(r.clientId),0);
}

function clientLastReelDate(id){
  const cReels = reels.filter(r=>r.clientId===id);
  if(cReels.length===0) return null;
  return cReels.reduce((latest,r)=> new Date(r.date) > new Date(latest) ? r.date : latest, cReels[0].date);
}

const NOW = new Date();
function daysAgoLabel(dateStr){
  if(!dateStr) return {text:'ролики ещё не добавлялись', cls:'stale'};
  const d = new Date(dateStr);
  const diff = Math.round((NOW - d) / (1000*60*60*24));
  let text;
  if(diff<=0) text = 'сегодня';
  else if(diff===1) text = 'вчера';
  else text = `${diff} дн. назад`;
  const cls = diff>14 ? 'stale' : diff>7 ? 'aging' : 'fresh';
  return {text, cls};
}

function balanceClass(n){
  if(n<=0) return 'danger';
  if(n<=2) return 'warn';
  return 'ok';
}
function balanceBadge(n){
  const cls = balanceClass(n);
  const label = n<0 ? `${n} (перерасход)` : n;
  return `<span class="balance ${cls}"><span class="n">${label}</span> ост.</span>`;
}

/* Статус активности клиента по дате последнего ролика:
   зелёный (fresh) — активный, жёлтый (aging) — нет материалов давно,
   красный (stale) — клиент, похоже, ушёл (или ролика не было вообще) */
function clientActivity(id){
  const dateStr = clientLastReelDate(id);
  const lu = daysAgoLabel(dateStr);
  const diff = dateStr ? Math.round((NOW - new Date(dateStr)) / (1000*60*60*24)) : Infinity;
  const order = lu.cls==='fresh' ? 0 : lu.cls==='aging' ? 1 : 2;
  const statusLabel = lu.cls==='fresh' ? 'Активный клиент' : lu.cls==='aging' ? 'Нет материалов' : 'Клиент ушёл';
  return {cls:lu.cls, text:lu.text, diff, order, statusLabel};
}

function formatDate(d){
  const date = new Date(d);
  return date.getDate() + ' ' + monthNamesShort[date.getMonth()];
}

/* ---------------- RENDER: DASHBOARD ---------------- */
function renderDashboard(){

    while(m<0){m+=12;y--;}
    months.push({m,y});
  }
  const monthly = months.map(({m,y})=>{
    const sum = payments.filter(p=>{const d=new Date(p.date); return d.getMonth()===m && d.getFullYear()===y;}).reduce((s,p)=>s+p.amount,0);
    return {label: monthNamesShort[m], sum};
  });
  const maxSum = Math.max(...monthly.map(x=>x.sum), 1);

  const totalRemaining = clients.reduce((s,c)=>s+Math.max(clientBalance(c.id),0),0);
  const lowBalanceClients = clients.filter(c=>clientBalance(c.id)<=2).sort((a,b)=>clientBalance(a.id)-clientBalance(b.id));

  const topClients = [...clients].map(c=>({...c, paid: clientTotalPaid(c.id), frozen: clientFrozenBudget(c.id)})).sort((a,b)=>b.paid-a.paid).slice(0,5);
  const maxPaid = Math.max(...topClients.map(c=>c.paid),1);

  const thisM = revenueThisMonth(), lastM = revenueLastMonth();
  const delta = lastM===0 ? 100 : Math.round(((thisM-lastM)/lastM)*100);

  const earnedThisM = earnedInMonth(0), earnedLastM = earnedInMonth(1);
  const earnedDelta = earnedLastM===0 ? 100 : Math.round(((earnedThisM-earnedLastM)/earnedLastM)*100);
  const reelsDoneThisM = reelsInMonth(0).length;
  const frozenTotal = totalFrozenBudget();

  return `
    <div class="grid">
      <div class="stat-card">
        <div class="label">Оборот за месяц</div>
        <div class="value">${fmtMoney(thisM)}</div>
        <div class="delta ${delta<0?'neg':''}">${delta>=0?'+':''}${delta}% к пред. месяцу</div>
      </div>
      <div class="stat-card">
        <div class="label">Заработано за месяц</div>
        <div class="value">${fmtMoney(Math.round(earnedThisM))}</div>
        <div class="delta ${earnedDelta<0?'neg':''}">${earnedDelta>=0?'+':''}${earnedDelta}% к пред. месяцу</div>
      </div>
      <div class="stat-card">
        <div class="label">Роликов готово в месяце</div>
        <div class="value">${reelsDoneThisM}</div>
        <div class="delta" style="color:var(--text-muted)">всего за всё время: ${reels.length}</div>
      </div>
      <div class="stat-card">
        <div class="label">Замороженный бюджет</div>
        <div class="value">${fmtMoney(Math.round(frozenTotal))}</div>
        <div class="delta" style="color:${lowBalanceClients.length? 'var(--warn)':'var(--text-muted)'}">оплачено, но не отработано</div>
      </div>
    </div>

    ${lowBalanceClients.length ? `
    <div class="panel alert-panel">
      <div class="panel-head">
        <h3>⚠ Заканчиваются ролики</h3>
        <span class="hint">${lowBalanceClients.length} клиент(ов) нужно продлить</span>
      </div>
      ${lowBalanceClients.map(c=>{
        const lu = daysAgoLabel(clientLastReelDate(c.id));
        return `
        <div class="rank-row">
          <div class="avatar" style="color:${c.color}">${initials(c.name)}</div>
          <div class="rank-info">
            <div class="name">${c.name}</div>
            <div class="meta">куплено ${clientReelsPurchased(c.id)} · готово ${clientReelsDone(c.id)}</div>
            <div class="last-update ${lu.cls}"><span class="dot"></span>${lu.text}</div>
          </div>
          ${balanceBadge(clientBalance(c.id))}
        </div>`;}).join('')}
    </div>` : ''}

    <div class="panel">
      <div class="panel-head">
        <h3>Доход по месяцам</h3>
        <span class="hint">последние 6 месяцев</span>
      </div>
      <div class="filmrule"></div>
      <div class="chart">
        ${monthly.map(x=>`
          <div class="col">
            <div class="bar-wrap"><div class="bar" style="height:${x.sum? (x.sum/maxSum*100):2}%"></div></div>
            <div class="m-value">${x.sum? Math.round(x.sum/1000)+'к':'—'}</div>
            <div class="m-label">${x.label}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h3>Топ клиентов по доходу</h3>
        <span class="hint">всего ${clients.length} клиентов</span>
      </div>
      ${topClients.map((c,i)=>`
        <div class="rank-row">
          <div class="rank-num">${i+1}</div>
          <div class="avatar" style="color:${c.color}">${initials(c.name)}</div>
          <div class="rank-info">
            <div class="name">${c.name}</div>
            <div class="meta">${clientReelsDone(c.id)} готово из ${clientReelsPurchased(c.id)}</div>
            <div class="bar-bg"><div class="bar-fg" style="width:${(c.paid/maxPaid*100)}%; background:${c.color}"></div></div>
          </div>
          <div class="rank-amount">${fmtMoney(c.paid)}<div style="font-size:11px; font-weight:600; color:var(--text-muted); margin-top:2px;">заморожено ${fmtMoney(Math.round(c.frozen))}</div></div>
        </div>`).join('')}
    </div>
  `;
}

function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.nav-item, .bn-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.tab===tab);
  });
  document.getElementById('pageTitle').textContent = titles[tab][0];
  document.getElementById('pageSub').textContent = titles[tab][1];
  render();
}

function render(){
  const content = document.getElementById('content');
  if(activeTab==='dashboard') content.innerHTML = renderDashboard();
  if(activeTab==='clients') content.innerHTML = renderClients();
  if(activeTab==='payments') content.innerHTML = renderPayments();
  if(activeTab==='reels') content.innerHTML = renderReels();
  attachContentEvents();
}

function attachContentEvents(){
  const search = document.getElementById('clientSearch');
  if(search){
    search.addEventListener('input', e=>{ clientFilter = e.target.value; renderKeepFocus(); });
  }
  document.querySelectorAll('[data-client]').forEach(el=>{
    el.addEventListener('click', ()=> openClientDetail(parseInt(el.dataset.client)));
  });
  document.querySelectorAll('[data-payment]').forEach(el=>{
    el.addEventListener('click', ()=> openEditPayment(parseInt(el.dataset.payment)));
  });
  document.querySelectorAll('[data-reel]').forEach(el=>{
    el.addEventListener('click', ()=> openEditReel(parseInt(el.dataset.reel)));
  });
}

function renderKeepFocus(){
  const content = document.getElementById('content');
  content.innerHTML = renderClients();
  attachContentEvents();
  const s = document.getElementById('clientSearch');
  s.focus(); s.setSelectionRange(s.value.length, s.value.length);
}

/* ---------------- ЭКРАН ВХОДА ----------------
   Простая защита от случайных людей, перешедших по ссылке.
   Логин/пароль хранятся в этом файле открытым текстом — это не защита
   от того, кто умеет смотреть код страницы, а просто "закрытая дверь"
   для всех остальных. Реальная защита данных — это RLS в Supabase
   и то, что ссылку на бота вы никому не публикуете.
------------------------------------------------------------------ */
/* ---------------- ЭКРАН ВХОДА ----------------
   Настоящий вход через Supabase Auth: проверка происходит на стороне
   базы данных, а не в браузере. Пока человек не вошёл под одним из
   аккаунтов, созданных в Supabase (Authentication → Users), база
   отклоняет любые запросы — это уже не просто "закрытая дверь",
   а реальная защита на уровне сервера (RLS требует auth.role() = 'authenticated').
------------------------------------------------------------------ */
async function tryLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Проверяю...';
  const {data, error} = await db.auth.signInWithPassword({email, password: pass});
  btn.disabled = false; btn.textContent = 'Войти';
  if(error){
    err.textContent = 'Неверный email или пароль';
    return;
  }
  document.getElementById('loginScreen').style.display = 'none';
  loadAll();
}
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
document.getElementById('loginEmail').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });

document.getElementById('logoutLink').addEventListener('click', async (e)=>{
  e.preventDefault();
  await db.auth.signOut();
  location.reload();
});

/* Если сессия уже сохранена в браузере (человек не выходил) — пускаем сразу */
(async ()=>{
  const {data:{session}} = await db.auth.getSession();
  if(session){
    document.getElementById('loginScreen').style.display = 'none';
    loadAll();
  }
})();
</script>
